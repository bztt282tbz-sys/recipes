<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ t('add_ingredient') }} - Recipe Vault</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="mb-4">{{ t('add_ingredient') }}</h3>
                        <form method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label class="form-label">{{ t('ingredient_name') }}</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">{{ t('density') }} Type</label>
                                <select name="density_type" id="densityType" class="form-select" onchange="updateDensityFields()">
                                    <option value="g/ml">g/ml</option>
                                    <option value="g/unit">g/unit</option>
                                </select>
                            </div>
                            <div id="densityMlField" class="mb-3">
                                <label class="form-label">{{ t('density') }} (g/ml)</label>
                                <input type="number" step="0.01" name="density" class="form-control" placeholder="e.g., 1.0">
                                <small class="text-muted">{{ t('tips') }}</small>
                            </div>
                            <div id="densityUnitFields" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label">{{ t('grams_per_unit') }}</label>
                                    <input type="number" step="0.01" name="grams_per_unit" class="form-control" placeholder="e.g., 150">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">{{ t('unit_name') }}</label>
                                    <input type="text" name="unit_name" class="form-control" placeholder="e.g., potato">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">{{ t('comment') }}</label>
                                <input type="text" name="comment" class="form-control" placeholder="e.g., Organic">
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('home') }}" class="btn btn-secondary">{{ t('cancel') }}</a>
                                <button type="submit" class="btn btn-success">{{ t('save') }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function updateDensityFields() {
            const type = document.getElementById('densityType').value;
            document.getElementById('densityMlField').style.display = type === 'g/ml' ? 'block' : 'none';
            document.getElementById('densityUnitFields').style.display = type === 'g/unit' ? 'block' : 'none';
        }
    </script>
</body>
</html>
