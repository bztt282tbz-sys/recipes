<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Ingredient - Recipe Vault</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-int">
                        <div class="card-body">
                            <h3 class="mb-4">New Ingredient</h3>
                            <form method="POST">
                                <div class="mb-3">
                                    <label class="form-label">Ingredient Name</label>
                                    <input type="text" name="name" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Density (g/ml)</label>
                                    <input type="number" step="0.01" name="density" class="form-control">
                                
                                </div>
                                <div class="d-flex justify-content-between">
                                    <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
                                    <button type="submit" class="btn btn-success">Save Ingredient</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
