<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Ingredient - Recipe Vault</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header">
                        <div class="card-body">
                            <h3 class="mb-4">New Ingredient</h3>
                            <form method="POST">
                                <div class="mb-3">
                                    <label class="form-label">Ingredient Name</label>
                                    <input type="text" name="name" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Density Type</label>
                                    <select name="density_type" id="densityType" class="form-select" onchange="updateDensityFields()">
                                        <option value="g/ml">g/ml (grams per milliliter)</option>
                                        <option value="g/unit">g/unit (grams per item, e.g., per potato)</option>
                                    </select>
                                </div>
                                <div id="densityMlField" class="mb-3">
                                    <label class="form-label">Density (g/ml)</label>
                                    <input type="number" step="0.01" name="density" class="form-control" placeholder="e.g., 1.0 for water">
                                    <small class="text-muted">Used for volume-to-weight conversion</small>
                                </div>
                                <div id="densityUnitFields" style="display: none;">
                                    <div class="mb-3">
                                        <label class="form-label">Grams per unit</label>
                                        <input type="number" step="0.01" name="grams_per_unit" class="form-control" placeholder="e.g., 150">
                                        <small class="text-muted">How many grams per one unit (e.g., one potato)</small>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Unit name (optional)</label>
                                        <input type="text" name="unit_name" class="form-control" placeholder="e.g., potato, apple, slice">
                                        <small class="text-muted">What is this unit called?</small>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Comment (optional)</label>
                                    <input type="text" name="comment" class="form-control" placeholder="e.g., Organic, Fresh, etc.">
                                    <small class="text-muted">A note about this ingredient</small>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
                                    <button type="submit" class="btn btn-success">Save Ingredient</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function updateDensityFields() {
            const type = document.getElementById('densityType').value;
            document.getElementById('densityMlField').style.display = type === 'g/ml' ? 'block' : 'none';
            document.getElementById('densityUnitFields').style.display = type === 'g/unit' ? 'block' : 'none';
        }
    </script>
</body>
</html>
