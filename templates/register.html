{% extends "base.html" %}

{% block title %}{{ t('register') }} - Simmer{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">{{ t('register') }}</h3>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('username') }}</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('password') }}</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">{{ t('register') }}</button>
                </form>
                <hr>
                <p class="text-center mb-0">{{ t('login') }}? <a href="{{ url_for('login') }}">{{ t('login') }}</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
