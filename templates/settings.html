{% extends "base.html" %}

{% block title %}{{ t('settings') }} - Simmer{% endblock %}

{% block content %}
<h2>{{ t('settings') }}</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">{{ t('change_name_title') }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="action" value="change_name">
                    <div class="mb-3">
                        <label class="form-label">{{ t('current_password') }} *</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('username') }}</label>
                        <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">{{ t('change_name') }}</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">{{ t('change_password_title') }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="action" value="change_password">
                    <div class="mb-3">
                        <label class="form-label">{{ t('current_password') }} *</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('new_password') }}</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('confirm_password') }}</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">{{ t('change_password') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
