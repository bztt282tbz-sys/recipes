{% extends "base.html" %}

{% block title %}{{ t('add_unit') }} - Flavor Archive{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">{{ t('add_unit') }}</h3>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('unit_name') }} (English)</label>
                        <input type="text" name="name" id="unitName" class="form-control" placeholder="e.g., tablespoon, cup" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('unit_name') }} (Russian)</label>
                        <input type="text" name="name_ru" id="unitNameRu" class="form-control" placeholder="e.g., ст.л., чашка">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('unit_type') }}</label>
                        <select name="unit_type" id="unitType" class="form-select" required>
                            <option value="volume" selected>{{ t('volume') }}</option>
                            <option value="mass">{{ t('mass') }}</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" id="conversionLabel">{{ t('grams_conversion') }}</label>
                        <input type="number" step="0.01" name="grams_conversion" class="form-control" placeholder="e.g., 15" required>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_bound" id="isBound" class="form-check-input" onchange="toggleIngredientBindings()">
                        <label class="form-check-label" for="isBound">{{ t('bound_to_ingredient') }}</label>
                    </div>

                    <div id="ingredientBindings" style="display: none;">
                        <label class="form-label">{{ t('ingredients') }}</label>
                        {% for ing in all_ingredients %}
                        <div class="row mb-1 align-items-center">
                            <div class="col-md-7">
                                <div class="form-check">
                                    <input type="checkbox" name="ingredient_id[]" value="{{ ing.id }}" class="form-check-input ingredient-check" id="ing{{ ing.id }}" onchange="toggleGrams(this)">
                                    <label class="form-check-label" for="ing{{ ing.id }}">{{ ing.name }}</label>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <input type="number" step="0.01" name="grams_override[]" class="form-control form-control-sm grams-input" placeholder="grams override" disabled>
                            </div>
                        </div>
                        {% endfor %}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">{{ t('cancel') }}</a>
                        <button type="submit" class="btn btn-success">{{ t('save') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleIngredientBindings() {
    const bindings = document.getElementById('ingredientBindings');
    bindings.style.display = document.getElementById('isBound').checked ? 'block' : 'none';
}

function toggleGrams(checkbox) {
    const row = checkbox.closest('.row');
    const gramsInput = row.querySelector('.grams-input');
    gramsInput.disabled = !checkbox.checked;
    if (!checkbox.checked) gramsInput.value = '';
}
</script>
{% endblock %}
