{% extends "base.html" %}

{% block title %}{{ t('add_recipe') }} - Recipe Vault{% endblock %}

{% block extra_css %}
<style>
    .tag-input {
        border: 1px solid #ced4da;
        border-radius: 4px;
        padding: 8px;
        min-height: 38px;
    }
    .tag-chip {
        display: inline-flex;
        align-items: center;
        background: #e9ecef;
        padding: 4px 8px;
        border-radius: 4px;
        margin: 2px;
        font-size: 0.875rem;
    }
    .tag-chip-remove {
        margin-left: 6px;
        cursor: pointer;
        color: #dc3545;
    }
    .tag-dropdown {
        position: absolute;
        z-index: 1000;
        background: white;
        border: 1px solid #ced4da;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        width: 100%;
        display: none;
    }
    .tag-dropdown-item {
        padding: 8px 12px;
        cursor: pointer;
    }
    .tag-dropdown-item:hover {
        background: #f8f9fa;
    }
    .tag-wrapper {
        position: relative;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">{{ t('add_recipe') }}</h3>
                <form method="POST" onsubmit="prepareTags()">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('title') }}</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('description') }}</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('portions') }}</label>
                        <input type="number" name="portions" class="form-control" value="4" min="0.5" step="0.5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Language</label>
                        <select name="language" class="form-select">
                            <option value="en" {% if lang=='en' %}selected{% endif %}>English</option>
                            <option value="de" {% if lang=='de' %}selected{% endif %}>Deutsch</option>
                            <option value="ru" {% if lang=='ru' %}selected{% endif %}>Russian</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tags (comma separated or click to add)</label>
                        <div class="tag-wrapper">
                            <div class="tag-input" id="tagContainer" onclick="focusTagInput()">
                                <input type="text" id="tagInput" placeholder="Type to search or create tags..." oninput="searchTags(this.value)" onkeydown="handleTagKeydown(event)" style="border: none; outline: none; width: 200px;">
                            </div>
                            <div class="tag-dropdown" id="tagDropdown"></div>
                        </div>
                        <input type="hidden" name="tag_ids[]" id="tagIds">
                        <input type="hidden" name="new_tags" id="newTags">
                    </div>

                    <hr>
                    <h5>{{ t('instructions') }}</h5>
                    <div id="steps-container"></div>
                    <button type="button" class="btn btn-outline-primary btn-sm mb-3" onclick="addStep()">+ {{ t('add_item') }}</button>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_draft" class="form-check-input" id="draftCheck">
                        <label class="form-check-label" for="draftCheck">{{ t('is_draft') }}</label>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">{{ t('cancel') }}</a>
                        <button type="submit" class="btn btn-primary" onclick="prepareTags()">{{ t('save_recipe') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let stepCount = 0;
const allUnits = {{ all_units|tojson }};
const allIngredients = {{ all_ingredients|tojson }};
let selectedTags = [];

function getUnitsForIngredient(ingredientId) {
    if (!ingredientId) return allUnits;
    return allUnits.filter(unit => {
        if (!unit.is_bound) return true;
        return unit.ingredients && unit.ingredients.includes(parseInt(ingredientId));
    });
}

function buildUnitsOptions(ingredientId, preferredUnitId) {
    const units = getUnitsForIngredient(ingredientId);
    const isRu = '{{ lang }}' === 'ru';
    let html = '<option value="">{{ t("unit_type") }}...</option>';
    units.forEach(unit => {
        const selected = unit.id === preferredUnitId ? ' selected' : '';
        const name = isRu && unit.name_ru ? unit.name_ru : unit.name;
        html += `<option value="${unit.id}"${selected}>${name}</option>`;
    });
    return html;
}

function addIngredient(stepNum) {
    const container = stepNum === 0 ? document.getElementById('global-ingredients') : document.getElementById('step-' + stepNum + '-ingredients');
    const row = document.createElement('div');
    row.className = 'row g-2 mb-2 ingredient-row';
    row.innerHTML = `
        <div class="col-md-5">
            <select name="ing_id[]" class="form-select ingredient-select" onchange="updateUnitDropdown(this)">
                <option value="">{{ t("ingredients") }}...</option>
                ${allIngredients.map(ing => `<option value="${ing.id}">${ing.name}</option>`).join('')}
            </select>
        </div>
        <div class="col-md-3">
            <input type="number" step="0.01" name="amount[]" class="form-control" placeholder="{{ t("quantity") }}">
        </div>
        <div class="col-md-2">
            <select name="unit_id[]" class="form-select unit-select">
                <option value="">{{ t("unit_type") }}...</option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="hidden" name="step_num[]" value="${stepNum}">
            <button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button>
        </div>
    `;
    container.appendChild(row);
}

function updateUnitDropdown(select) {
    const row = select.closest('.ingredient-row');
    const unitSelect = row.querySelector('.unit-select');
    const ingredientId = select.value;
    const ing = allIngredients.find(i => i.id === parseInt(ingredientId));
    const preferredUnitId = ing ? ing.preferred_unit_id : null;
    unitSelect.innerHTML = buildUnitsOptions(ingredientId, preferredUnitId);
}

function addStep() {
    stepCount++;
    const container = document.getElementById('steps-container');
    const stepDiv = document.createElement('div');
    stepDiv.className = 'card mb-3';
    stepDiv.id = 'step-' + stepCount;
    stepDiv.innerHTML = `
        <div class="card-body">
            <h6>{{ t("step") }} ${stepCount}</h6>
            <div class="mb-3">
                <textarea name="step_instruction[]" class="form-control" rows="2" placeholder="{{ t("instructions") }}..."></textarea>
            </div>
            <div id="step-${stepCount}-ingredients"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addIngredient(${stepCount})">+ {{ t("add_ingredient") }}</button>
            <button type="button" class="btn btn-outline-danger btn-sm ms-2" onclick="removeStep(${stepCount})">{{ t("delete") }}</button>
        </div>
    `;
    container.appendChild(stepDiv);
}

function removeRow(btn) { btn.closest('.ingredient-row').remove(); }
function removeStep(num) { document.getElementById('step-' + num).remove(); }

function focusTagInput() {
    document.getElementById('tagInput').focus();
}

function searchTags(query) {
    const dropdown = document.getElementById('tagDropdown');
    if (!query) {
        dropdown.style.display = 'none';
        return;
    }
    fetch('/api/tags?q=' + encodeURIComponent(query))
        .then(r => r.json())
        .then(data => {
            if (data.tags && data.tags.length > 0) {
                dropdown.innerHTML = data.tags.map(t =>
                    `<div class="tag-dropdown-item" onclick="addTag(${t.id}, '${t.name}')">${t.name}</div>`
                ).join('');
                dropdown.style.display = 'block';
            } else {
                dropdown.innerHTML = `<div class="tag-dropdown-item" onclick="createNewTag('${query}')">Create "${query}"</div>`;
                dropdown.style.display = 'block';
            }
        });
}

function addTag(id, name) {
    if (!selectedTags.find(t => t.id === id)) {
        selectedTags.push({id, name});
        renderTags();
    }
    document.getElementById('tagInput').value = '';
    document.getElementById('tagDropdown').style.display = 'none';
}

function createNewTag(name) {
    if (!selectedTags.find(t => t.name === name)) {
        selectedTags.push({id: null, name: name, isNew: true});
        renderTags();
    }
    document.getElementById('tagInput').value = '';
    document.getElementById('tagDropdown').style.display = 'none';
}

function removeTag(index) {
    selectedTags.splice(index, 1);
    renderTags();
}

function renderTags() {
    const container = document.getElementById('tagContainer');
    container.innerHTML = selectedTags.map((t, i) =>
        `<span class="tag-chip">${t.name}<span class="tag-chip-remove" onclick="removeTag(${i})">x</span></span>`
    ).join('') + `<input type="text" id="tagInput" placeholder="Type to search or create tags..." oninput="searchTags(this.value)" onkeydown="handleTagKeydown(event)" style="border: none; outline: none; width: 200px;">`;
}

function handleTagKeydown(e) {
    if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = e.target.value.trim().replace(',', '');
        if (val) {
            createNewTag(val);
        }
    }
    if (e.key === 'Backspace' && !e.target.value && selectedTags.length > 0) {
        removeTag(selectedTags.length - 1);
    }
}

function prepareTags() {
    const existingTags = selectedTags.filter(t => t.id !== null).map(t => t.id);
    const newTags = selectedTags.filter(t => t.isNew).map(t => t.name).join(',');
    document.getElementById('tagIds').value = existingTags.join(',');
    document.getElementById('newTags').value = newTags;
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.tag-wrapper')) {
        document.getElementById('tagDropdown').style.display = 'none';
    }
});
</script>
{% endblock %}
